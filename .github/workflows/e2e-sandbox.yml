name: e2e-sandbox

# Full paywall flow (signup → checkout → webhook → access → cancel → 403)
# against Polar SANDBOX + Supabase + AgentMail. Runs against a deployed URL,
# not local — so it catches the same integration drift that the offline
# `e2e-smoke` (per-PR) cannot.
#
# Current state: **manual trigger only** (`workflow_dispatch`). To enable
# automatic runs on every merge to `staging`, uncomment the `push:` block
# below AFTER you've added the secrets listed under "Required secrets".
#
# Required secrets (Settings → Secrets and variables → Actions):
#   POLAR_SANDBOX_ACCESS_TOKEN         polar_oat_... for the sandbox org
#   POLAR_SANDBOX_PRODUCT_HOSTED       sandbox product id for the Hosted tier
#   POLAR_SANDBOX_PRODUCT_LEAD         sandbox product id for the Lead tier
#   POLAR_SANDBOX_WEBHOOK_SECRET       sandbox webhook secret (Standard Webhooks)
#   AGENTMAIL_API_KEY                  am_... for receiving the email-confirm
#   SUPABASE_TEST_SERVICE_ROLE_KEY     service-role key for the *test* Supabase
#                                      project (do NOT use the production one)
#   E2E_TARGET_URL                     where to point Playwright, e.g.
#                                      https://hoursmith-staging.vercel.app
#
# Security: every value flowing into `run:` is passed via `env:` (never
# interpolated directly into the shell), per the GitHub Actions injection
# guidance.

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to test against (overrides E2E_TARGET_URL secret if set)'
        required: false
        type: string
  # Uncomment after secrets are set, to run on every merge to staging:
  # push:
  #   branches: [staging]

jobs:
  e2e-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check that required secrets are present
        id: secrets
        env:
          POLAR_SANDBOX_ACCESS_TOKEN: ${{ secrets.POLAR_SANDBOX_ACCESS_TOKEN }}
          POLAR_SANDBOX_PRODUCT_HOSTED: ${{ secrets.POLAR_SANDBOX_PRODUCT_HOSTED }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
        run: |
          missing=""
          [ -z "$POLAR_SANDBOX_ACCESS_TOKEN" ] && missing="$missing POLAR_SANDBOX_ACCESS_TOKEN"
          [ -z "$POLAR_SANDBOX_PRODUCT_HOSTED" ] && missing="$missing POLAR_SANDBOX_PRODUCT_HOSTED"
          [ -z "$AGENTMAIL_API_KEY" ] && missing="$missing AGENTMAIL_API_KEY"
          if [ -n "$missing" ]; then
            echo "::warning::e2e-sandbox is not yet configured. Missing secrets:$missing"
            echo "::warning::See .github/workflows/e2e-sandbox.yml header for the full list."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.secrets.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        if: steps.secrets.outputs.skip == 'false'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.secrets.outputs.skip == 'false'
        run: npx playwright install --with-deps chromium

      # TODO: write `e2e/paywall-sandbox.spec.ts` covering signup → checkout →
      # webhook → /account active → cancel → proxy 403. Until that exists,
      # this step exits non-zero so the workflow shape is reviewable but the
      # job is honestly red until the spec is written (tracked as ADA-274).
      - name: Run paywall sandbox e2e (TODO — spec not written yet)
        if: steps.secrets.outputs.skip == 'false'
        env:
          E2E_TARGET_URL: ${{ inputs.target_url || secrets.E2E_TARGET_URL }}
          POLAR_SANDBOX_ACCESS_TOKEN: ${{ secrets.POLAR_SANDBOX_ACCESS_TOKEN }}
          POLAR_SANDBOX_PRODUCT_HOSTED: ${{ secrets.POLAR_SANDBOX_PRODUCT_HOSTED }}
          POLAR_SANDBOX_PRODUCT_LEAD: ${{ secrets.POLAR_SANDBOX_PRODUCT_LEAD }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
        run: |
          echo "TODO: invoke 'npx playwright test e2e/paywall-sandbox.spec.ts' once the spec lands (ADA-274)."
          exit 1

      - name: Upload Playwright report on failure
        if: failure() && steps.secrets.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-sandbox
          path: playwright-report/
          retention-days: 7
